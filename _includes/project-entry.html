<article class="project-entry">
  <div class="project-media" aria-hidden="true"><span>{{ include.index }}</span></div>
  <div class="project-copy">
    <p class="project-label">{{ include.label }}</p>
    <h3>{{ include.title }}</h3>
    <p class="project-problem">{{ include.problem }}</p>
    {{ include.body }}
  </div>
</article>
